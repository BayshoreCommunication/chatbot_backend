name: CI/CD

on:
  push:
    branches: [ "main" ]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show repo tree (debug)
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type f -iname "requirements*.txt" -print || true

      - name: Install deps (root requirements.txt)
        run: |
          set -e
          python -m pip install --upgrade pip wheel setuptools
          test -f requirements.txt || (echo "requirements.txt not found at repo root" && exit 1)
          pip install -r requirements.txt

      - name: Compile quick check
        run: |
          set -e
          FILES=$(git ls-files '*.py' || true)
          if [ -n "$FILES" ]; then python -m py_compile $FILES; else echo "No .py files"; fi

  deploy:
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate SSH key secret
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          set -e
          if [ -z "$SSH_KEY" ]; then echo "ERROR: SSH_KEY secret is empty"; exit 1; fi
          if ! echo "$SSH_KEY" | head -n1 | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
            echo "ERROR: SSH_KEY does not look like an OpenSSH private key."
            echo "Recreate with: ssh-keygen -t ed25519 -f ~/.ssh/do_deploy_bayai -N \"\""
            exit 1
          fi

      - name: Prepare SSH key & known_hosts
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_KEY:  ${{ secrets.SSH_KEY }}
        run: |
          set -e
          echo "$SSH_KEY" > id_ed25519
          chmod 600 id_ed25519
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload with rsync
        env:
          SSH_HOST:   ${{ secrets.SSH_HOST }}
          SSH_USER:   ${{ secrets.SSH_USER }}
          REMOTE_PATH:${{ secrets.REMOTE_PATH }}
        run: |
          set -e
          rsync -avzr --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "venv/" \
            -e "ssh -i id_ed25519 -o StrictHostKeyChecking=yes" \
            ./ "$SSH_USER@$SSH_HOST:$REMOTE_PATH"

      - name: Run remote deploy script
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -e
          ssh -i id_ed25519 -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" \
            'bash /var/www/chatbot_backend/deploy.sh'
